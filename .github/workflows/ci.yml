name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

# Cancel in-flight runs for the same branch on new push
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Lint & Format ────────────────────────────────────────────────────────
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install linting tools
        run: pip install ruff

      - name: ruff — lint
        run: ruff check src/ tests/

      - name: ruff — format check
        run: ruff format --check src/ tests/

  # ── 2. Type Check ────────────────────────────────────────────────────────────
  typecheck:
    name: Type Check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package + type stubs
        run: |
          pip install -e ".[dev,django,fastapi,redis]"
          pip install types-PyYAML types-redis fakeredis

      - name: mypy
        run: mypy src/flagforge --pretty --show-error-codes

  # ── 3. Tests + Coverage ──────────────────────────────────────────────────────
  test:
    name: Test / Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -e ".[dev,django,fastapi,redis]"
          pip install aiosqlite fakeredis httpx

      - name: Run tests with coverage
        run: |
          pytest \
            --cov=flagforge \
            --cov-report=xml \
            --cov-report=term-missing \
            --cov-fail-under=80 \
            -q

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  # ── 4. Security — SAST (bandit) ──────────────────────────────────────────────
  security-sast:
    name: Security / SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit
        run: |
          bandit -r src/flagforge \
            -c pyproject.toml \
            --format json \
            --output bandit-report.json \
            --exit-zero
          bandit -r src/flagforge -c pyproject.toml -ll

      - name: Upload bandit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 14

  # ── 5. Security — Dependency Audit ───────────────────────────────────────────
  security-deps:
    name: Security / Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Audit dependencies
        run: |
          pip install -e ".[all]"
          pip-audit \
            --format json \
            --output pip-audit-report.json \
            --ignore-vuln PYSEC-2022-42969 \
            || true
          pip-audit -s osv

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pip-audit-report
          path: pip-audit-report.json
          retention-days: 14

  # ── 6. Security — Secret Scanning ────────────────────────────────────────────
  security-secrets:
    name: Security / Secret Scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history for gitleaks

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 7. Publish to PyPI (on version tag) ──────────────────────────────────────
  publish:
    name: Publish to PyPI
    needs: [test, typecheck, security-sast, security-deps]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment: pypi
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
