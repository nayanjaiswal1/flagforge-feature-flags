default_install_hook_types: [pre-commit, commit-msg]
default_stages: [pre-commit]

repos:
  # ── Ruff: lint + format (replaces flake8, isort, pyupgrade) ─────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format

  # ── mypy: static type checking ───────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --pretty]
        additional_dependencies:
          - pydantic>=2.0
          - click>=8.0
          - pyyaml>=6.0
          - types-PyYAML
          - types-redis

  # ── bandit: Python security linter ──────────────────────────────────────────
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.8
    hooks:
      - id: bandit
        args: [-c, pyproject.toml]
        additional_dependencies: ["bandit[toml]"]
        # Only scan source, not tests
        files: ^src/

  # ── detect-secrets: prevent committing credentials ──────────────────────────
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: [--baseline, .secrets.baseline]
        exclude: package-lock\.json|\.secrets\.baseline

  # ── gitleaks: secret scanning ────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.3
    hooks:
      - id: gitleaks

  # ── General file hygiene ─────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-docstring-first
      - id: debug-statements        # catches leftover print/breakpoint/pdb
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]

  # ── Conventional commits: enforce commit message format ──────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v3.2.0
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]
        args:
          - feat
          - fix
          - docs
          - style
          - refactor
          - perf
          - test
          - chore
          - ci
          - build
          - revert
